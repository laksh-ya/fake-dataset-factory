<svg viewBox="0 0 860 920" xmlns="http://www.w3.org/2000/svg" width="860" height="920" font-family="Arial, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M1 1L9 5L1 9" fill="none" stroke="#64748b" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-teal" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M1 1L9 5L1 9" fill="none" stroke="#0d9488" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-white" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M1 1L9 5L1 9" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="860" height="920" fill="#f8fafc" rx="0"/>

  <!-- ─── STEP 1: Dataset ─── -->
  <rect x="270" y="20" width="320" height="64" rx="10" fill="#1e3a5f" stroke="#1e3a5f"/>
  <text x="430" y="47" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle">Kaggle Chest X-Ray Dataset</text>
  <text x="430" y="68" font-size="11" fill="#93c5fd" text-anchor="middle">5,216 images · Normal + Pneumonia</text>

  <!-- Arrow down -->
  <line x1="430" y1="84" x2="430" y2="112" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ─── STEP 2: Preprocessing ─── -->
  <rect x="290" y="116" width="280" height="54" rx="8" fill="#e0f2fe" stroke="#7dd3fc" stroke-width="1"/>
  <text x="430" y="139" font-size="12" font-weight="700" fill="#0c4a6e" text-anchor="middle">Preprocessing</text>
  <text x="430" y="158" font-size="10.5" fill="#0369a1" text-anchor="middle">Resize → 64×64 · Grayscale · Normalize</text>

  <!-- Split arrows -->
  <line x1="350" y1="170" x2="230" y2="200" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="510" y1="170" x2="630" y2="200" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Class boxes -->
  <rect x="150" y="204" width="160" height="40" rx="7" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
  <text x="230" y="229" font-size="11.5" font-weight="700" fill="#166534" text-anchor="middle">Normal (1,341)</text>

  <rect x="550" y="204" width="160" height="40" rx="7" fill="#fef9c3" stroke="#fde047" stroke-width="1"/>
  <text x="630" y="229" font-size="11.5" font-weight="700" fill="#854d0e" text-anchor="middle">Pneumonia (3,875)</text>

  <!-- arrows into engines box -->
  <line x1="230" y1="244" x2="290" y2="280" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="630" y1="244" x2="570" y2="280" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ─── STEP 3: 6 Generation Engines ─── -->
  <rect x="60" y="284" width="740" height="220" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="430" y="314" font-size="13" font-weight="700" fill="#94a3b8" text-anchor="middle" letter-spacing="2">6 GENERATION ENGINES</text>

  <!-- Engine cards: row 1 -->
  <!-- SD -->
  <rect x="80" y="326" width="150" height="64" rx="8" fill="#312e81" stroke="#6366f1" stroke-width="1"/>
  <text x="155" y="349" font-size="11" font-weight="700" fill="#e0e7ff" text-anchor="middle">Stable Diffusion</text>
  <text x="155" y="364" font-size="9.5" fill="#a5b4fc" text-anchor="middle">img2img · 2022</text>
  <text x="155" y="378" font-size="9" fill="#818cf8" text-anchor="middle">FID: 94.71</text>

  <!-- DCGAN -->
  <rect x="246" y="326" width="150" height="64" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
  <text x="321" y="349" font-size="11" font-weight="700" fill="#dbeafe" text-anchor="middle">DCGAN</text>
  <text x="321" y="364" font-size="9.5" fill="#93c5fd" text-anchor="middle">BCE Loss · 2014</text>
  <text x="321" y="378" font-size="9" fill="#60a5fa" text-anchor="middle">FID: 15.24</text>

  <!-- WGAN-GP -->
  <rect x="412" y="326" width="150" height="64" rx="8" fill="#164e3a" stroke="#10b981" stroke-width="1"/>
  <text x="487" y="349" font-size="11" font-weight="700" fill="#d1fae5" text-anchor="middle">WGAN-GP</text>
  <text x="487" y="364" font-size="9.5" fill="#6ee7b7" text-anchor="middle">Wasserstein · 2017</text>
  <text x="487" y="378" font-size="9" fill="#34d399" text-anchor="middle">FID: 11.10</text>

  <!-- VQ-VAE -->
  <rect x="578" y="326" width="200" height="64" rx="8" fill="#3b1a4e" stroke="#a855f7" stroke-width="1"/>
  <text x="678" y="349" font-size="11" font-weight="700" fill="#f3e8ff" text-anchor="middle">VQ-VAE</text>
  <text x="678" y="364" font-size="9.5" fill="#d8b4fe" text-anchor="middle">Codebook · 2017</text>
  <text x="678" y="378" font-size="9" fill="#c084fc" text-anchor="middle">FID: 46.59</text>

  <!-- Row 2 -->
  <!-- DDPM -->
  <rect x="163" y="406" width="200" height="84" rx="8" fill="#1a2e44" stroke="#0ea5e9" stroke-width="1"/>
  <text x="263" y="430" font-size="11" font-weight="700" fill="#e0f2fe" text-anchor="middle">DDPM</text>
  <text x="263" y="448" font-size="9.5" fill="#7dd3fc" text-anchor="middle">Diffusion · 2020</text>
  <text x="263" y="463" font-size="9.5" fill="#7dd3fc" text-anchor="middle">1000 timesteps</text>
  <text x="263" y="479" font-size="9" fill="#38bdf8" text-anchor="middle">FID: 8.96</text>

  <!-- Flow Matching v2 — BEST -->
  <rect x="379" y="400" width="360" height="90" rx="8" fill="#064e3b" stroke="#10b981" stroke-width="2"/>
  <!-- Gold star indicator -->
  <rect x="379" y="400" width="360" height="14" rx="8" fill="#059669"/>
  <rect x="379" y="408" width="360" height="6" fill="#059669"/>
  <text x="559" y="411" font-size="9" font-weight="700" fill="#ffffff" text-anchor="middle" letter-spacing="1">★  BEST MODEL</text>
  <text x="559" y="436" font-size="12" font-weight="700" fill="#d1fae5" text-anchor="middle">Flow Matching v2</text>
  <text x="559" y="453" font-size="9.5" fill="#6ee7b7" text-anchor="middle">OT-CFM + Attention + EMA · 2022</text>
  <text x="559" y="468" font-size="9.5" fill="#6ee7b7" text-anchor="middle">100 epochs · dopri5 ODE solver</text>
  <text x="559" y="483" font-size="10" font-weight="700" fill="#34d399" text-anchor="middle">FID: 6.20  ←  state-of-the-art</text>

  <!-- Arrow down from engines -->
  <line x1="430" y1="504" x2="430" y2="534" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="430" y="522" font-size="10" fill="#94a3b8" text-anchor="middle">100 synthetic images / model</text>

  <!-- ─── STEP 4: Evaluation ─── -->
  <rect x="80" y="538" width="700" height="140" rx="12" fill="#faf5eb" stroke="#fcd34d" stroke-width="1.5"/>
  <text x="430" y="564" font-size="13" font-weight="700" fill="#78350f" text-anchor="middle" letter-spacing="1">EVALUATION PIPELINE</text>

  <!-- FID box -->
  <rect x="100" y="576" width="290" height="82" rx="8" fill="#fff7ed" stroke="#fb923c" stroke-width="1"/>
  <text x="245" y="599" font-size="11" font-weight="700" fill="#c2410c" text-anchor="middle">Domain-Adapted FID</text>
  <text x="245" y="616" font-size="10" fill="#7c3aed" text-anchor="middle">torchxrayvision DenseNet121</text>
  <text x="245" y="631" font-size="9.5" fill="#92400e" text-anchor="middle">pretrained on NIH + CheXpert + MIMIC</text>
  <text x="245" y="646" font-size="9.5" fill="#92400e" text-anchor="middle">medically meaningful feature space</text>

  <!-- TSTR box -->
  <rect x="410" y="576" width="350" height="82" rx="8" fill="#fdf4ff" stroke="#c084fc" stroke-width="1"/>
  <text x="585" y="599" font-size="11" font-weight="700" fill="#7e22ce" text-anchor="middle">Proxy TSTR Accuracy</text>
  <text x="585" y="616" font-size="10" fill="#7e22ce" text-anchor="middle">xrv classifier · Lung Opacity &gt; 0.5</text>
  <text x="585" y="631" font-size="9.5" fill="#6b21a8" text-anchor="middle">100% all models (texture detection)</text>
  <text x="585" y="646" font-size="9.5" fill="#6b21a8" text-anchor="middle">non-discriminative for this task</text>

  <!-- Arrow down -->
  <line x1="430" y1="678" x2="430" y2="706" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ─── STEP 5: Output ─── -->
  <rect x="180" y="710" width="500" height="56" rx="8" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
  <text x="430" y="737" font-size="12" font-weight="700" fill="#14532d" text-anchor="middle">Export Package</text>
  <text x="430" y="754" font-size="10.5" fill="#166534" text-anchor="middle">images/  ·  labels.csv  ·  metrics.json  →  ZIP</text>

  <!-- Arrow down -->
  <line x1="430" y1="766" x2="430" y2="796" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ─── STEP 6: Gradio UI ─── -->
  <rect x="230" y="800" width="400" height="70" rx="10" fill="#0f172a" stroke="#475569"/>
  <text x="430" y="828" font-size="13" font-weight="700" fill="#f1f5f9" text-anchor="middle">Gradio UI</text>
  <text x="430" y="848" font-size="10.5" fill="#94a3b8" text-anchor="middle">Pick model · class · count → generate + download</text>
  <text x="430" y="864" font-size="10" fill="#64748b" text-anchor="middle">auto-detects trained models · HuggingFace Spaces</text>

  <!-- Step labels on the left -->
  <text x="28" y="52" font-size="10" font-weight="700" fill="#94a3b8" text-anchor="middle">INPUT</text>
  <text x="28" y="146" font-size="10" font-weight="700" fill="#94a3b8" text-anchor="middle">PREP</text>
  <text x="28" y="400" font-size="10" font-weight="700" fill="#94a3b8" text-anchor="middle">GEN</text>
  <text x="28" y="610" font-size="10" font-weight="700" fill="#94a3b8" text-anchor="middle">EVAL</text>
  <text x="28" y="838" font-size="10" font-weight="700" fill="#94a3b8" text-anchor="middle">UI</text>

  <!-- vertical step connector on left -->
  <line x1="28" y1="60" x2="28" y2="830" stroke="#334155" stroke-width="1" stroke-dasharray="3 3"/>
</svg>
